<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spatial Tech — Login | GIS & Remote Sensing Hub</title>
    <meta name="description"
        content="Sign in or create your Spatial Tech account to access GIS & Remote Sensing tools, AI assistant, and curated resources." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <!-- Restore theme -->
    <script>
      (function(){
        const t = localStorage.getItem('spatialtech_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #030810;
            --surface: rgba(255, 255, 255, 0.06);
            --surface2: rgba(255, 255, 255, 0.10);
            --border: rgba(255, 255, 255, 0.12);
            --text: #f0f4ff;
            --text2: #8899bb;
            --c1: #3b82f6;
            --c2: #8b5cf6;
            --c3: #06b6d4;
            --c4: #39ff85;
            --c5: #f97316;
            --c6: #ec4899;
            --radius: 20px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html {
            font-size: 16px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ── 3D CANVAS ── */
        #bgCanvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* ── AURORA OVERLAY ── */
        .aurora {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background:
                radial-gradient(ellipse 60% 40% at 20% 30%, rgba(59, 130, 246, 0.15) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 80% 70%, rgba(139, 92, 246, 0.15) 0%, transparent 60%),
                radial-gradient(ellipse 40% 30% at 50% 50%, rgba(6, 182, 212, 0.08) 0%, transparent 60%);
        }

        /* ── MAIN CARD ── */
        .auth-wrap {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 460px;
            padding: 1rem;
        }

        .auth-brand {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-logo {
            width: 52px;
            height: 52px;
            margin: 0 auto 0.75rem;
            background: linear-gradient(135deg, var(--c3), var(--c1));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.4);
            animation: logo-pulse 3s ease-in-out infinite;
        }

        @keyframes logo-pulse {

            0%,
            100% {
                box-shadow: 0 0 30px rgba(59, 130, 246, 0.4);
            }

            50% {
                box-shadow: 0 0 50px rgba(139, 92, 246, 0.6);
            }
        }

        .auth-brand h1 {
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--c3), var(--c2), var(--c6));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .auth-brand p {
            color: var(--text2);
            font-size: 0.88rem;
            margin-top: 0.25rem;
        }

        .auth-card {
            background: rgba(10, 15, 35, 0.8);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2.5rem;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--c3), var(--c2), transparent);
            opacity: 0.7;
        }

        /* ── TABS ── */
        .tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
        }

        .tab-btn {
            flex: 1;
            padding: 0.6rem 1rem;
            border: none;
            background: none;
            color: var(--text2);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 9px;
            transition: var(--transition);
        }

        .tab-btn.active {
            background: linear-gradient(135deg, var(--c1), var(--c2));
            color: #fff;
            box-shadow: 0 4px 16px rgba(59, 130, 246, 0.35);
        }

        /* ── FORM ── */
        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
            animation: fadeIn 0.35s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text2);
            margin-bottom: 0.4rem;
            letter-spacing: 0.3px;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1rem;
            pointer-events: none;
            opacity: 0.6;
        }

        .form-group input {
            width: 100%;
            padding: 0.85rem 1rem 0.85rem 2.8rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 0.93rem;
            transition: var(--transition);
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--c1);
            background: rgba(59, 130, 246, 0.07);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .form-group input::placeholder {
            color: var(--text2);
            opacity: 0.7;
        }

        /* Password toggle */
        .pw-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text2);
            font-size: 1rem;
            padding: 0;
            transition: var(--transition);
        }

        .pw-toggle:hover {
            color: var(--c1);
        }

        /* Password strength */
        .pw-strength {
            display: flex;
            gap: 4px;
            margin-top: 6px;
        }

        .pw-bar {
            height: 3px;
            flex: 1;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.1);
            transition: background 0.3s ease;
        }

        /* Options row */
        .form-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        .checkbox-wrap {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .checkbox-wrap input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--c1);
        }

        .checkbox-wrap span {
            font-size: 0.82rem;
            color: var(--text2);
        }

        .forgot-link {
            font-size: 0.82rem;
            color: var(--c1);
            text-decoration: none;
            transition: var(--transition);
        }

        .forgot-link:hover {
            color: var(--c3);
        }

        /* Submit button */
        .btn-auth {
            width: 100%;
            padding: 0.95rem;
            border: none;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: var(--transition);
            background: linear-gradient(135deg, var(--c1), var(--c2));
            color: #fff;
            box-shadow: 0 6px 24px rgba(59, 130, 246, 0.35);
            letter-spacing: 0.3px;
        }

        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 36px rgba(59, 130, 246, 0.5);
        }

        .btn-auth:active {
            transform: translateY(0);
        }

        .btn-auth .loader {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Error / success alerts */
        .alert {
            padding: 0.7rem 1rem;
            border-radius: 10px;
            font-size: 0.84rem;
            margin-bottom: 1rem;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .alert.error {
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        .alert.success {
            background: rgba(34, 197, 94, 0.12);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider span {
            font-size: 0.78rem;
            color: var(--text2);
            white-space: nowrap;
        }

        /* Social buttons (decorative) */
        .social-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-bottom: 0;
        }

        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.7rem 1rem;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text2);
            font-family: 'Inter', sans-serif;
            font-size: 0.83rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-social:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.22);
            color: var(--text);
        }

        /* ── GOOGLE SIGN-IN BUTTON ── */
        .divider-or {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.25rem 0;
        }

        .divider-or::before,
        .divider-or::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider-or span {
            font-size: 0.75rem;
            color: var(--text2);
            white-space: nowrap;
            font-weight: 500;
        }

        .btn-google {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            width: 100%;
            padding: 0.85rem 1rem;
            background: #fff;
            border: 1px solid rgba(0,0,0,0.15);
            border-radius: 12px;
            color: #3c4043;
            font-family: 'Inter', sans-serif;
            font-size: 0.92rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
        }

        .btn-google:hover {
            background: #f8f8f8;
            box-shadow: 0 4px 18px rgba(0,0,0,0.18);
            transform: translateY(-2px);
        }

        .btn-google:active {
            transform: translateY(0);
        }

        .btn-google .g-logo {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        /* Footer note */
        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.78rem;
            color: var(--text2);
        }

        .auth-footer a {
            color: var(--c1);
            text-decoration: none;
        }

        /* ── FLOATING LABELS background particles ── */
        .floating-badges {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 2;
            overflow: hidden;
        }

        .fbadge {
            position: absolute;
            padding: 0.35rem 0.8rem;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.25);
            white-space: nowrap;
            animation: float-badge linear infinite;
        }

        @keyframes float-badge {
            0% {
                transform: translateY(110vh) rotate(-5deg);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 0.5;
            }

            100% {
                transform: translateY(-20vh) rotate(5deg);
                opacity: 0;
            }
        }

        @media (max-width: 520px) {
            .auth-card {
                padding: 1.75rem 1.25rem;
            }

            .auth-wrap {
                padding: 0.75rem;
            }
        }
    </style>
</head>

<body>

    <!-- 3D Background Canvas -->
    <canvas id="bgCanvas"></canvas>

    <!-- Aurora overlay -->
    <div class="aurora"></div>

    <!-- Floating GIS terms -->
    <div class="floating-badges" id="floatingBadges"></div>

    <!-- Auth Card -->
    <div class="auth-wrap">
        <div class="auth-brand">
            <div class="auth-logo">🌍</div>
            <h1>Spatial Tech</h1>
            <p>GIS &amp; Remote Sensing Knowledge Hub</p>
        </div>

        <div class="auth-card">
            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-btn active" id="tabSignIn" onclick="switchAuthTab('signin')">Sign In</button>
                <button class="tab-btn" id="tabSignUp" onclick="switchAuthTab('signup')">Sign Up</button>
            </div>

            <!-- Alert -->
            <div class="alert" id="authAlert"></div>

            <!-- ── SIGN IN FORM ── -->
            <form class="auth-form active" id="formSignin" onsubmit="handleSignIn(event)">
                <div class="form-group">
                    <label for="signinEmail">Email Address</label>
                    <div class="input-wrap">
                        <span class="input-icon">📧</span>
                        <input type="email" id="signinEmail" placeholder="you@example.com" required
                            autocomplete="email" />
                    </div>
                </div>

                <div class="form-group">
                    <label for="signinPassword">Password</label>
                    <div class="input-wrap">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="signinPassword" placeholder="Your password" required
                            autocomplete="current-password" />
                        <button type="button" class="pw-toggle" onclick="togglePw('signinPassword', this)">👁️</button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="checkbox-wrap">
                        <input type="checkbox" id="rememberMe" />
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-link" onclick="forgotPassword(event)">Forgot password?</a>
                </div>

                <button type="submit" class="btn-auth" id="btnSignin">
                    <span class="btn-text">Sign In →</span>
                    <div class="loader" id="signinLoader"></div>
                </button>

                <div class="divider-or"><span>or continue with</span></div>

                <button type="button" class="btn-google" onclick="signInWithGoogle()" id="btnGoogleSignin">
                    <svg class="g-logo" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Continue with Google
                </button>

            </form>

            <!-- ── SIGN UP FORM ── -->
            <form class="auth-form" id="formSignup" onsubmit="handleSignUp(event)">
                <div class="form-group">
                    <label for="signupName">Full Name</label>
                    <div class="input-wrap">
                        <span class="input-icon">👤</span>
                        <input type="text" id="signupName" placeholder="Your full name" required autocomplete="name" />
                    </div>
                </div>

                <div class="form-group">
                    <label for="signupEmail">Email Address</label>
                    <div class="input-wrap">
                        <span class="input-icon">📧</span>
                        <input type="email" id="signupEmail" placeholder="you@example.com" required
                            autocomplete="email" />
                    </div>
                </div>

                <div class="form-group">
                    <label for="signupPassword">Password</label>
                    <div class="input-wrap">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="signupPassword" placeholder="Min 8 characters" required
                            oninput="updateStrength(this.value)" />
                        <button type="button" class="pw-toggle" onclick="togglePw('signupPassword', this)">👁️</button>
                    </div>
                    <div class="pw-strength">
                        <div class="pw-bar" id="bar1"></div>
                        <div class="pw-bar" id="bar2"></div>
                        <div class="pw-bar" id="bar3"></div>
                        <div class="pw-bar" id="bar4"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="signupConfirm">Confirm Password</label>
                    <div class="input-wrap">
                        <span class="input-icon">🔑</span>
                        <input type="password" id="signupConfirm" placeholder="Repeat your password" required />
                    </div>
                </div>

                <button type="submit" class="btn-auth" id="btnSignup">
                    <span class="btn-text">Create Account →</span>
                    <div class="loader" id="signupLoader"></div>
                </button>

                <div class="divider-or"><span>or sign up with</span></div>

                <button type="button" class="btn-google" onclick="signInWithGoogle()">
                    <svg class="g-logo" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Continue with Google
                </button>
            </form>

            <div class="auth-footer">
                By signing in you agree to our <a href="#">Terms &amp; Privacy Policy</a>.<br />
                <a href="index.html">← Back to Spatial Tech</a>
            </div>
        </div>
    </div>

    <!-- Three.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        'use strict';

        /* ── THREE.JS 3D GLOBE ── */
        (function initThreeJS() {
            const canvas = document.getElementById('bgCanvas');
            if (!window.THREE) return;

            const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);

            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 4);

            // Globe
            const globeGeo = new THREE.SphereGeometry(1, 64, 64);
            const globeMat = new THREE.MeshPhongMaterial({
                color: 0x0a1a3a,
                emissive: 0x051020,
                wireframe: false,
                shininess: 40,
            });
            const globe = new THREE.Mesh(globeGeo, globeMat);
            scene.add(globe);

            // Wireframe overlay
            const wireMat = new THREE.MeshBasicMaterial({
                color: 0x1e40af,
                wireframe: true,
                transparent: true,
                opacity: 0.15
            });
            const wireGlobe = new THREE.Mesh(new THREE.SphereGeometry(1.005, 24, 24), wireMat);
            scene.add(wireGlobe);

            // Glowing atmosphere
            const atmGeo = new THREE.SphereGeometry(1.18, 32, 32);
            const atmMat = new THREE.MeshBasicMaterial({
                color: 0x3b82f6,
                transparent: true,
                opacity: 0.06,
                side: THREE.FrontSide
            });
            scene.add(new THREE.Mesh(atmGeo, atmMat));

            // Hotspot dots on globe surface
            const hotspots = [
                [20, 78],   // India
                [37, -100], // USA
                [51, 10],   // Europe
                [-14, -50], // Brazil
                [36, 104],  // China
                [30, 31],   // Egypt
                [-25, 130], // Australia
            ];

            hotspots.forEach(([lat, lon]) => {
                const phi = (90 - lat) * Math.PI / 180;
                const theta = (lon + 180) * Math.PI / 180;
                const x = -(Math.sin(phi) * Math.cos(theta));
                const y = Math.cos(phi);
                const z = Math.sin(phi) * Math.sin(theta);

                const dotGeo = new THREE.SphereGeometry(0.025, 8, 8);
                const colors = [0x3b82f6, 0x8b5cf6, 0x06b6d4, 0x39ff85, 0xf97316, 0xec4899];
                const dotMat = new THREE.MeshBasicMaterial({ color: colors[Math.floor(Math.random() * colors.length)] });
                const dot = new THREE.Mesh(dotGeo, dotMat);
                dot.position.set(x * 1.01, y * 1.01, z * 1.01);
                globe.add(dot);
            });

            // Orbiting ring
            const ringGeo = new THREE.TorusGeometry(1.5, 0.004, 8, 128);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0x3b82f6, transparent: true, opacity: 0.5 });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.rotation.x = 0.4;
            scene.add(ring);

            // Satellite on orbit
            const satGeo = new THREE.SphereGeometry(0.04, 8, 8);
            const satMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const satellite = new THREE.Mesh(satGeo, satMat);
            scene.add(satellite);

            // Stars
            const starVerts = [];
            for (let i = 0; i < 2000; i++) {
                starVerts.push(
                    (Math.random() - 0.5) * 100,
                    (Math.random() - 0.5) * 100,
                    (Math.random() - 0.5) * 100
                );
            }
            const starGeo = new THREE.BufferGeometry();
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVerts, 3));
            const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.08, transparent: true, opacity: 0.6 });
            scene.add(new THREE.Points(starGeo, starMat));

            // Lights
            scene.add(new THREE.AmbientLight(0x1a2a4a, 1));
            const pointLight = new THREE.PointLight(0x3b82f6, 2, 10);
            pointLight.position.set(3, 3, 3);
            scene.add(pointLight);
            const pointLight2 = new THREE.PointLight(0x8b5cf6, 1.5, 10);
            pointLight2.position.set(-3, -2, 2);
            scene.add(pointLight2);

            camera.position.z = 3.5;

            let t = 0;

            function animate() {
                requestAnimationFrame(animate);
                t += 0.005;

                globe.rotation.y += 0.003;
                wireGlobe.rotation.y += 0.003;
                ring.rotation.z += 0.008;

                // Satellite orbit
                satellite.position.x = Math.cos(t) * 1.5;
                satellite.position.z = Math.sin(t) * 1.5;
                satellite.position.y = Math.sin(t * 0.5) * 0.4;

                renderer.render(scene, camera);
            }
            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        })();

        /* ── FLOATING BADGES ── */
        const gisTerms = ['NDVI', 'SAR', 'DEM', 'LiDAR', 'GEE', 'QGIS', 'GeoJSON', 'Sentinel-2', 'GDAL', 'PostGIS', 'InSAR', 'LULC', 'Rasterio', 'GeoPandas', 'PyProj', 'Orthophoto', 'DTM', 'ArcGIS', 'Landsat', 'MODIS'];

        function spawnBadge() {
            const el = document.createElement('div');
            el.className = 'fbadge';
            el.textContent = gisTerms[Math.floor(Math.random() * gisTerms.length)];
            el.style.left = Math.random() * 100 + 'vw';
            const dur = 8 + Math.random() * 14;
            el.style.animationDuration = dur + 's';
            el.style.animationDelay = Math.random() * 4 + 's';
            document.getElementById('floatingBadges').appendChild(el);
            setTimeout(() => el.remove(), (dur + 4) * 1000);
        }

        for (let i = 0; i < 12; i++) setTimeout(spawnBadge, i * 600);
        setInterval(spawnBadge, 2500);

        /* ── AUTH LOGIC ── */
        const USERS_KEY = 'spatialtech_users';
        const SESSION_KEY = 'spatialtech_session';

        // Seed default admin account
        (function seedDefaultUsers() {
            const users = JSON.parse(localStorage.getItem(USERS_KEY) || '[]');
            if (!users.find(u => u.email === 'admin@spatialtech.com')) {
                users.push({
                    id: 'admin_001',
                    name: 'Admin User',
                    email: 'admin@spatialtech.com',
                    password: 'Admin@123',
                    role: 'admin',
                    createdAt: new Date().toISOString(),
                    avatar: '🛡️'
                });
                localStorage.setItem(USERS_KEY, JSON.stringify(users));
            }
        })();

        // Check if already logged in
        (function checkExistingSession() {
            const session = JSON.parse(sessionStorage.getItem(SESSION_KEY) || localStorage.getItem(SESSION_KEY) || 'null');
            if (session && session.id) {
                window.location.href = 'index.html';
            }
        })();

        function switchAuthTab(tab) {
            document.getElementById('tabSignIn').classList.toggle('active', tab === 'signin');
            document.getElementById('tabSignUp').classList.toggle('active', tab === 'signup');
            document.getElementById('formSignin').classList.toggle('active', tab === 'signin');
            document.getElementById('formSignup').classList.toggle('active', tab === 'signup');
            hideAlert();
        }

        function showAlert(msg, type = 'error') {
            const el = document.getElementById('authAlert');
            el.textContent = msg;
            el.className = `alert ${type}`;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 5000);
        }

        function hideAlert() {
            document.getElementById('authAlert').style.display = 'none';
        }

        function togglePw(inputId, btn) {
            const inp = document.getElementById(inputId);
            inp.type = inp.type === 'password' ? 'text' : 'password';
            btn.textContent = inp.type === 'password' ? '👁️' : '🙈';
        }

        function updateStrength(pw) {
            let score = 0;
            if (pw.length >= 8) score++;
            if (/[A-Z]/.test(pw)) score++;
            if (/[0-9]/.test(pw)) score++;
            if (/[^A-Za-z0-9]/.test(pw)) score++;

            const colors = ['#ef4444', '#f97316', '#eab308', '#22c55e'];
            for (let i = 1; i <= 4; i++) {
                const bar = document.getElementById('bar' + i);
                bar.style.background = i <= score ? colors[score - 1] : 'rgba(255,255,255,0.1)';
            }
        }

        function setLoading(formId, loading) {
            const btnText = document.querySelector(`#${formId} .btn-text`);
            const loader = document.querySelector(`#${formId} .loader`);
            const btn = document.querySelector(`#${formId} .btn-auth`);
            btnText.style.display = loading ? 'none' : 'block';
            loader.style.display = loading ? 'block' : 'none';
            btn.disabled = loading;
        }

        function login(user, remember) {
            const session = { id: user.id, name: user.name, email: user.email, role: user.role, avatar: user.avatar };
            const store = remember ? localStorage : sessionStorage;
            store.setItem(SESSION_KEY, JSON.stringify(session));
            window.location.href = 'index.html';
        }

        function handleSignIn(e) {
            e.preventDefault();
            hideAlert();
            const email = document.getElementById('signinEmail').value.trim().toLowerCase();
            const password = document.getElementById('signinPassword').value;
            const remember = document.getElementById('rememberMe').checked;

            setLoading('formSignin', true);
            setTimeout(() => {
                const users = JSON.parse(localStorage.getItem(USERS_KEY) || '[]');
                const user = users.find(u => u.email === email && u.password === password);
                setLoading('formSignin', false);
                if (user) {
                    login(user, remember);
                } else {
                    showAlert('❌ Invalid email or password. Try Demo Access or Admin Demo below.');
                }
            }, 800);
        }

        function handleSignUp(e) {
            e.preventDefault();
            hideAlert();
            const name = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim().toLowerCase();
            const password = document.getElementById('signupPassword').value;
            const confirm = document.getElementById('signupConfirm').value;

            if (password !== confirm) { showAlert('❌ Passwords do not match.'); return; }
            if (password.length < 8) { showAlert('❌ Password must be at least 8 characters.'); return; }

            setLoading('formSignup', true);
            setTimeout(() => {
                const users = JSON.parse(localStorage.getItem(USERS_KEY) || '[]');
                if (users.find(u => u.email === email)) {
                    setLoading('formSignup', false);
                    showAlert('❌ An account with this email already exists. Please sign in.');
                    return;
                }
                const newUser = {
                    id: 'user_' + Date.now(),
                    name, email, password,
                    role: 'user',
                    createdAt: new Date().toISOString(),
                    avatar: '👤'
                };
                users.push(newUser);
                localStorage.setItem(USERS_KEY, JSON.stringify(users));
                setLoading('formSignup', false);
                showAlert('✅ Account created! Signing you in…', 'success');
                setTimeout(() => login(newUser, false), 1200);
            }, 1000);
        }

        function forgotPassword(e) {
            e.preventDefault();
            showAlert('📧 If this email is registered, a password reset link will be sent.', 'success');
        }

        /* ── GOOGLE SIGN-IN ── */
        // IMPORTANT: Replace the value below with your actual Google OAuth 2.0 Client ID.
        // Get one at: https://console.cloud.google.com → APIs & Services → Credentials → OAuth 2.0 Client IDs
        // Set Authorized JavaScript origins to: http://localhost and/or your deployed domain.
        const GOOGLE_CLIENT_ID = '';

        // Initialize Google Identity Services when the library loads
        window.onload = function () {
            if (window.google && GOOGLE_CLIENT_ID) {
                google.accounts.id.initialize({
                    client_id: GOOGLE_CLIENT_ID,
                    callback: handleGoogleCredential,
                    auto_select: false,
                    cancel_on_tap_outside: true,
                });
            }
        };

        function signInWithGoogle() {
            if (!window.google || !GOOGLE_CLIENT_ID) {
                showAlert(
                    '⚙️ Google Sign-In requires a Client ID. ' +
                    'Add your Google OAuth Client ID in login.html (GOOGLE_CLIENT_ID variable). ' +
                    'Get one at console.cloud.google.com → APIs & Services → Credentials.',
                    'error'
                );
                return;
            }
            // Show the Google One Tap prompt / OAuth popup
            try {
                google.accounts.id.prompt(function(notification) {
                    if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
                        // Fall back to OAuth popup via renderButton approach
                        showGooglePopup();
                    }
                });
            } catch (err) {
                showGooglePopup();
            }
        }

        function showGooglePopup() {
            // Create a hidden Google button and click it for the popup flow
            const container = document.createElement('div');
            container.style.cssText = 'position:fixed;opacity:0;pointer-events:none;top:0;left:0';
            document.body.appendChild(container);
            try {
                google.accounts.id.renderButton(container, {
                    type: 'standard',
                    theme: 'outline',
                    size: 'large'
                });
                const btn = container.querySelector('[role="button"]') || container.querySelector('button');
                if (btn) btn.click();
            } catch(e) {
                showAlert('❌ Google popup failed. Check your Client ID and domain configuration.', 'error');
            }
            setTimeout(() => document.body.removeChild(container), 3000);
        }

        function handleGoogleCredential(response) {
            // Decode the JWT credential to get user info
            const payload = parseJwt(response.credential);
            if (!payload) {
                showAlert('❌ Google authentication failed. Please try again.', 'error');
                return;
            }

            const email    = payload.email || '';
            const name     = payload.name  || email.split('@')[0] || 'Google User';
            const picture  = payload.picture || '';
            const googleId = payload.sub || ('google_' + Date.now());

            // Check or create user in localStorage
            const users = JSON.parse(localStorage.getItem(USERS_KEY) || '[]');
            let user = users.find(u => u.email === email);
            if (!user) {
                user = {
                    id: 'google_' + googleId,
                    name, email,
                    password: null,        // Google users have no local password
                    role: 'user',
                    avatar: picture || '🟡',
                    googleId,
                    createdAt: new Date().toISOString(),
                };
                users.push(user);
                localStorage.setItem(USERS_KEY, JSON.stringify(users));
            } else {
                // Update Google photo if not stored
                if (!user.googleId) {
                    user.googleId = googleId;
                    if (picture) user.avatar = picture;
                    localStorage.setItem(USERS_KEY, JSON.stringify(users));
                }
            }

            showAlert('✅ Signed in with Google as ' + name + '!', 'success');
            setTimeout(() => login(user, true), 900);
        }

        function parseJwt(token) {
            try {
                const base64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
                return JSON.parse(atob(base64));
            } catch (e) {
                return null;
            }
        }
    </script>
